{% load static %}
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          "primary": "#3525cd",
          "primary-container": "#4f46e5",
          "on-primary": "#ffffff",
          "secondary": "#831ada",
          "secondary-container": "#9e41f5",
          "surface": "#faf8ff",
          "surface-container-lowest": "#ffffff",
          "surface-container-low": "#f2f3ff",
          "surface-container": "#eaedff",
          "surface-container-high": "#e2e7ff",
          "surface-container-highest": "#dae2fd",
          "on-surface": "#131b2e",
          "on-surface-variant": "#464555",
          "outline": "#777587",
          "outline-variant": "#c7c4d8",
          "background": "#faf8ff",
          "error": "#ba1a1a",
          "success": "#0d8a4f",
          "warning": "#e8930c",
        },
        fontFamily: {
          sans: ["Inter", "sans-serif"],
          mono: ["JetBrains Mono", "monospace"],
        },
        boxShadow: {
          "card": "0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1)",
          "glow": "0 0 24px rgba(79, 70, 229, 0.25)",
        },
      },
    },
  };
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .material-symbols-outlined.filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { font-family: 'Inter', sans-serif; }
  .lesson-content h2 { font-size: 1.5rem; font-weight: 700; margin: 2rem 0 0.75rem; color: #131b2e; letter-spacing: -0.01em; }
  .lesson-content h3 { font-size: 1.15rem; font-weight: 600; margin: 1.5rem 0 0.5rem; color: #131b2e; }
  .lesson-content p { margin: 0.75rem 0; line-height: 1.7; color: #464555; }
  .lesson-content ul, .lesson-content ol { margin: 0.75rem 0 0.75rem 1.5rem; line-height: 1.7; color: #464555; }
  .lesson-content ul { list-style: disc; }
  .lesson-content ol { list-style: decimal; }
  .lesson-content li { margin: 0.35rem 0; }
  .lesson-content strong { color: #131b2e; }
  .lesson-content .prompt-box { background: #eaedff; border: 1px solid #c7c4d8; border-radius: 0.75rem; padding: 1rem 1.25rem; margin: 1rem 0; font-family: 'JetBrains Mono', monospace; font-size: 0.875rem; color: #131b2e; white-space: pre-wrap; }

  .lesson-content table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.9rem; }
  .lesson-content th { text-align: left; padding: 0.6rem 0.9rem; background: #eaedff; font-weight: 600; color: #131b2e; }
  .lesson-content td { padding: 0.6rem 0.9rem; border-top: 1px solid #e2e7ff; color: #464555; }
  .chat-bubble p { margin: 0.4rem 0; }
  .chat-bubble ul, .chat-bubble ol { margin: 0.4rem 0 0.4rem 1.25rem; list-style: disc; }
  .chat-bubble strong { font-weight: 600; }
</style>
