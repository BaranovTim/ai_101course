{% load static %}
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
{# All assets served locally from static/vendor — no internet/CDN required. #}
<script src="{% static 'vendor/tailwind.js' %}"></script>
<link href="{% static 'vendor/fonts.css' %}" rel="stylesheet"/>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          "primary": "#3525cd",
          "primary-container": "#4f46e5",
          "on-primary": "#ffffff",
          "secondary": "#831ada",
          "secondary-container": "#9e41f5",
          "surface": "#faf8ff",
          "surface-container-lowest": "#ffffff",
          "surface-container-low": "#f2f3ff",
          "surface-container": "#eaedff",
          "surface-container-high": "#e2e7ff",
          "surface-container-highest": "#dae2fd",
          "on-surface": "#131b2e",
          "on-surface-variant": "#464555",
          "outline": "#777587",
          "outline-variant": "#c7c4d8",
          "background": "#faf8ff",
          "error": "#ba1a1a",
          "success": "#0d8a4f",
          "warning": "#e8930c",
        },
        fontFamily: {
          sans: ["Inter", "sans-serif"],
          mono: ["JetBrains Mono", "monospace"],
        },
        boxShadow: {
          "card": "0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1)",
          "glow": "0 0 24px rgba(79, 70, 229, 0.25)",
        },
      },
    },
  };
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .material-symbols-outlined.filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { font-family: 'Inter', sans-serif; }
  .lesson-content h2 { font-size: 1.5rem; font-weight: 700; margin: 2rem 0 0.75rem; color: #131b2e; letter-spacing: -0.01em; }
  .lesson-content h3 { font-size: 1.15rem; font-weight: 600; margin: 1.5rem 0 0.5rem; color: #131b2e; }
  .lesson-content p { margin: 0.75rem 0; line-height: 1.7; color: #464555; }
  .lesson-content ul, .lesson-content ol { margin: 0.75rem 0 0.75rem 1.5rem; line-height: 1.7; color: #464555; }
  .lesson-content ul { list-style: disc; }
  .lesson-content ol { list-style: decimal; }
  .lesson-content li { margin: 0.35rem 0; }
  .lesson-content strong { color: #131b2e; }
  .lesson-content .prompt-box { background: #eaedff; border: 1px solid #c7c4d8; border-radius: 0.75rem; padding: 1rem 1.25rem; margin: 1rem 0; font-family: 'JetBrains Mono', monospace; font-size: 0.875rem; color: #131b2e; white-space: pre-wrap; }
  .lesson-content .callout { background: #f0dbff; border-left: 4px solid #831ada; border-radius: 0.5rem; padding: 1rem 1.25rem; margin: 1rem 0; }
  .lesson-content table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.9rem; }
  .lesson-content th { text-align: left; padding: 0.6rem 0.9rem; background: #eaedff; font-weight: 600; color: #131b2e; }
  .lesson-content td { padding: 0.6rem 0.9rem; border-top: 1px solid #e2e7ff; color: #464555; }
  .chat-bubble p { margin: 0.4rem 0; }
  .chat-bubble ul, .chat-bubble ol { margin: 0.4rem 0 0.4rem 1.25rem; list-style: disc; }
  .chat-bubble strong { font-weight: 600; }

  /* Shiny assistant button */
  @keyframes ai101-pulse {
    0%, 100% { box-shadow: 0 0 18px rgba(79, 70, 229, 0.45), 0 0 36px rgba(147, 51, 234, 0.25); }
    50% { box-shadow: 0 0 28px rgba(79, 70, 229, 0.7), 0 0 56px rgba(147, 51, 234, 0.45); }
  }
  @keyframes ai101-shine {
    0% { transform: translateX(-150%) rotate(25deg); }
    60%, 100% { transform: translateX(250%) rotate(25deg); }
  }
  @keyframes ai101-pop {
    0% { opacity: 0; transform: translateY(12px) scale(0.96); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  .ai101-fab {
    position: relative; overflow: hidden;
    animation: ai101-pulse 2.6s ease-in-out infinite;
  }
  .ai101-fab::after {
    content: ""; position: absolute; top: -60%; left: 0; width: 40%; height: 220%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent);
    animation: ai101-shine 3.2s ease-in-out infinite;
  }
  .ai101-panel { animation: ai101-pop 0.22s ease-out; }

  /* ===== Visual effects layer ===== */

  /* Scroll reveal (activated by effects.js — content stays visible without JS) */
  .js [data-reveal] { opacity: 0; transform: translateY(28px); transition: opacity 0.7s cubic-bezier(0.22,1,0.36,1), transform 0.7s cubic-bezier(0.22,1,0.36,1); }
  .js [data-reveal="left"]  { transform: translateX(-36px); }
  .js [data-reveal="right"] { transform: translateX(36px); }
  .js [data-reveal="zoom"]  { transform: scale(0.92); }
  .js [data-reveal].revealed { opacity: 1; transform: none; }

  /* Shimmering gradient headline */
  @keyframes gradient-x { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
  .gradient-animate {
    background-size: 200% 200%;
    animation: gradient-x 5s ease infinite;
  }

  /* Floating blobs */
  @keyframes blob-float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(28px, -34px) scale(1.08); }
    66% { transform: translate(-22px, 22px) scale(0.94); }
  }
  .blob {
    position: absolute; border-radius: 9999px; filter: blur(70px); opacity: 0.5;
    pointer-events: none; animation: blob-float 14s ease-in-out infinite;
  }

  /* Slow float for cards / icons */
  @keyframes floaty { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  .floaty { animation: floaty 5s ease-in-out infinite; }

  /* Infinite marquee */
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .marquee-track { display: flex; width: max-content; animation: marquee 30s linear infinite; }
  .marquee:hover .marquee-track { animation-play-state: paused; }

  /* 3D tilt cards (transform set by effects.js) */
  .tilt { transform-style: preserve-3d; transition: transform 0.18s ease-out, box-shadow 0.3s ease; will-change: transform; }

  /* Animated aurora background for CTA panels */
  @keyframes aurora {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .aurora {
    background: linear-gradient(115deg, #3525cd, #831ada, #4f46e5, #9e41f5, #3525cd);
    background-size: 300% 300%;
    animation: aurora 9s ease infinite;
  }

  /* Progress bars sweep in (width set by effects.js) */
  .js .bar-animated { transition: width 1.1s cubic-bezier(0.22,1,0.36,1); }

  /* Sticky nav shadow when scrolled */
  .nav-scrolled { box-shadow: 0 8px 30px -12px rgba(53, 37, 205, 0.25); }

  /* Blinking caret for the rotating word */
  @keyframes caret-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  .caret { display: inline-block; width: 3px; height: 0.9em; background: #831ada; margin-left: 2px; vertical-align: -0.08em; animation: caret-blink 0.9s step-end infinite; }

  /* Icon wiggle on card hover */
  @keyframes wiggle { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(-8deg); } 75% { transform: rotate(8deg); } }
  .group:hover .wiggle-on-hover { animation: wiggle 0.5s ease-in-out; }

  @media (prefers-reduced-motion: reduce) {
    .blob, .floaty, .marquee-track, .gradient-animate, .aurora, .ai101-fab, .ai101-fab::after, .caret { animation: none !important; }
    .js [data-reveal] { opacity: 1 !important; transform: none !important; transition: none !important; }
    .tilt { transition: none; }
  }
</style>
<script>document.documentElement.classList.add("js");</script>
