{% extends "base.html" %}
{% block title %}Payment Cancelled | AI 101 Academy{% endblock %}
{% block content %}
<section class="mx-auto flex max-w-[1280px] justify-center px-4 py-24 sm:px-10">
  <div class="w-full max-w-lg rounded-3xl border border-outline-variant/60 bg-white p-10 text-center shadow-card">
    <span class="mx-auto flex h-20 w-20 items-center justify-center rounded-full bg-surface-container">
      <span class="material-symbols-outlined text-5xl text-on-surface-variant">shopping_cart_off</span>
    </span>
    <h1 class="mt-6 text-3xl font-extrabold tracking-tight">Checkout cancelled</h1>
    <p class="mt-3 text-on-surface-variant">No charge was made. Whenever you're ready, your spot in the course is waiting.</p>
    <a href="{% url 'pricing' %}" class="mt-8 inline-block rounded-lg bg-primary-container px-8 py-3.5 font-semibold text-white shadow-card transition hover:-translate-y-px hover:shadow-glow">Back to Pricing</a>
  </div>
</section>
{% endblock %}
